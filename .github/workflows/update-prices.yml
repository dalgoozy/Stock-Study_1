name: 주가 자동 업데이트

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install yfinance requests

      - name: 주가 데이터 업데이트
        run: python update_prices.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "이선생 봇"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "주가 자동 업데이트 $(date '+%Y.%m.%d %H:%M') KST"
          git push
